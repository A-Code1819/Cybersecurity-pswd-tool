<!DOCTYPE html>
<html>

<head>

<title>CyberSec Password Lab</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>CyberSec Password Security Lab</h1>

<div class="card">

<h2>Password Generator</h2>

<input type="number" id="length" value="16">

<button onclick="generatePassword()">Generate</button>

<div class="output" id="generated"></div>

</div>


<div class="card">

<h2>Password Strength Analyzer</h2>

<input type="text" id="passwordInput" placeholder="Enter password">

<button onclick="checkStrength()">Analyze</button>

<div class="strength-bar">

<div id="strengthFill"></div>

</div>

<p id="entropy"></p>

</div>


<div class="terminal">

<div class="terminal-header">Security Terminal</div>

<div id="terminalOutput"></div>

<input id="terminalInput" placeholder="type command...">

</div>

</div>

<script>
    function generatePassword(){

let length=document.getElementById("length").value

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()"

let password=""

for(let i=0;i<length;i++){

password+=chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("generated").innerText=password

}


function checkStrength(){

let pass=document.getElementById("passwordInput").value

let charset=0

if(/[a-z]/.test(pass)) charset+=26
if(/[A-Z]/.test(pass)) charset+=26
if(/[0-9]/.test(pass)) charset+=10
if(/[^A-Za-z0-9]/.test(pass)) charset+=32

let entropy=pass.length*Math.log2(charset)

document.getElementById("entropy").innerText="Entropy: "+entropy.toFixed(2)

let strengthFill=document.getElementById("strengthFill")

let percent=Math.min(entropy,100)

strengthFill.style.width=percent+"%"

}

</script>

</body>

</html>
